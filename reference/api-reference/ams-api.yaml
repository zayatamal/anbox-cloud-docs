definitions:
  Addon:
    description: Addon describes a package with additional functionality to be added
      to containers
    type: object
    properties:
      entitlements:
        description: List of entitlements the user has for this addon
        type: array
        items:
          type: string
        example:
          - can_view
          - can_delete
      name:
        description: Name of the addon
        type: string
        example: my-addon
      used_by:
        description: List of applications using this addon
        type: array
        items:
          type: string
        example:
          - app1
          - app2
      versions:
        description: List of versions of the addon
        type: array
        items:
          $ref: '#/definitions/AddonVersion'
  AddonPatch:
    description: AddonPatch allows updating an existing addon with a new version
    type: object
  AddonVersion:
    description: AddonVersion describes a single version of an addon
    type: object
    properties:
      created_at:
        description: Creation timestamp of the addon
        type: integer
        format: int64
        example: 1610641117
      fingerprint:
        description: SHA-256 fingerprint of the addon version
        type: string
        example: 0791cfc011f67c60b7bd0f852ddb686b79fa46083d9d43ef9845c9235c67b261
      size:
        description: Size (in bytes) of the addon payload
        type: integer
        format: int64
        example: 529887868
      version:
        description: Version for the addon
        type: integer
        format: int64
        example: 0
  AddonsPost:
    description: AddonsPost is used to create a new addon
    type: object
    properties:
      name:
        description: Name of the addon
        type: string
        example: my-addon
  Application:
    description: Application represents an AMS application
    type: object
    properties:
      abi:
        description: ABI supported by the application
        type: string
        example: x86_64
      addons:
        description: List of addons enabled for the application
        type: array
        items:
          type: string
        example:
          - ssh
          - gms
      boot_package:
        description: Name of the boot package for the application
        type: string
        example: com.foo.bar
      created_at:
        description: Creation UTC timestamp of the application
        type: integer
        format: int64
        example: 1532150640
      entitlements:
        description: Entitlements available to the user for this application
        type: array
        items:
          type: string
        example:
          - can_view
          - can_edit
          - can_delete
      id:
        description: ID of the application
        type: string
        example: btavtegj1qm58qg7ru50
      immutable:
        description: Flag to show whether the application can be edited
        type: boolean
        example: false
      inhibit_auto_updates:
        description: Whether or not to auto update the application's base image
        type: boolean
        example: false
      instance_type:
        description: Instance type required by the application
        type: string
        example: a2.3
      name:
        description: Name of the application
        type: string
        example: my-app
      node_selector:
        description: List of tags for filtering the nodes to run the application on
        type: array
        items:
          type: string
        example:
          - gpu=nvidia
          - cpu=intel
      parent_image_id:
        description: Parent image used for the application
        type: string
        example: btavtegj1qm58qg7ru50
      parent_image_variant:
        description: Parent image variant that the application is based on
        type: string
        example: android
      published:
        description: Whether or not the application is published
        type: boolean
        example: false
      resources:
        $ref: '#/definitions/ApplicationResources'
      status:
        description: Current status of the application
        type: string
        enum:
          - initializing
          - unknown
          - ready
          - deleted
          - error
        example: deleted
      status_code:
        $ref: '#/definitions/ApplicationStatus'
      tags:
        description: Tags to attach to the application
        type: array
        items:
          type: string
        example:
          - created_by=anbox
      versions:
        description: List of versions for the application
        type: array
        items:
          $ref: '#/definitions/ApplicationVersion'
      vm:
        description: Whether the application is based on virtual machines or containers
        type: boolean
  ApplicationAddon:
    description: ApplicationAddon describes a specific version of an addon an application
      version uses
    type: object
    properties:
      name:
        description: Name of the application addon
        type: string
        example: ssh
      version:
        description: Version of the application addon
        type: integer
        format: int64
        example: 0
  ApplicationBootstrap:
    description: ApplicationBootstrap describes the fields used to configure the application
      bootstrap
    type: object
    properties:
      keep:
        description: List of files to keep after the bootstrap
        type: array
        items:
          type: string
        example:
          - app.apk
  ApplicationDelete:
    description: ApplicationDelete represents the fields used to delete an application
    type: object
    properties:
      force:
        description: Whether deletion of the application should be forced
        type: boolean
        example: false
  ApplicationExtraData:
    description: ApplicationExtraData represents an extra application data
    type: object
    properties:
      owner:
        description: Owner and group for the files
        type: string
        example: root:root
      permissions:
        description: Unix permissions for the files
        type: string
        example: '0644'
      target:
        description: Path to the target file on the android filesystem
        type: string
