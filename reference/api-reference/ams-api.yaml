            - false
          type: string
          default: 0
          description: Do not wait for instance to reach its desired status
          name: no_wait
          in: query
        - name: details
          in: body
          schema:
            $ref: '#/definitions/ContainerPatch'
      responses:
        '202':
          description: Success response of the service
          schema:
            $ref: '#/definitions/OperationResponse'
        '400':
          $ref: '#/responses/ErrorBadRequest'
        '404':
          $ref: '#/responses/ErrorNotFound'
        '500':
          $ref: '#/responses/InternalServerError'
  /1.0/containers/{id}/exec:
    post:
      description: 'This endpoint is used to run a command in the container. The endpoint
        returns

        an operation which will contain either 2 or 4 websockets.

        In non-interactive mode, you''ll get one websocket for each of stdin, stdout
        and stderr.

        In interactive mode, a single bi-directional websocket is used for stdin and
        stdout/stderr.


        An additional "control" socket is always added on top which can be used for
        out of band

        communication with LXD. This allows sending signals and window sizing information
        through.'
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - containers
      summary: Execute a command in a container
      operationId: container_exec_post
      parameters:
        - type: string
          name: id
          in: path
          required: true
        - description: Exec request
          name: exec
          in: body
          schema:
            $ref: '#/definitions/ContainerExecPost'
      responses:
        '202':
          description: Success response of the service
          schema:
            $ref: '#/definitions/OperationResponse'
        '400':
          $ref: '#/responses/ErrorBadRequest'
        '404':
          $ref: '#/responses/ErrorNotFound'
        '500':
          $ref: '#/responses/InternalServerError'
