    post:
      description: 'This endpoint creates a new instance based on an application,
        image, or

        an existing instance.


        To create from an existing instance, ensure that the source instance is in

        the "stopped" or "error" state; otherwise, the request will fail with an

        error (for example, "instance must be stopped"), then:

        1. leave ''app_id'' and ''image_id'' empty.

        2. populate the ''source'' object with the source instance ID and type ''instance''.


        When creating from an existing instance, certain properties are derived from
        the

        source instance and are not freely configurable in the request:

        addons

        image architecture

        disk size

        application ID and version

        image ID and version


        All other configuration fields (e.g., CPU, Memory, GPU slots, Display settings)

        are NOT inherited from the source instance. If not provided in the request,

        they will be initialized with their default values, just like a standard instance
        creation.


        If AMS cannot fulfill the resource requirements for creating the instance,

        the request will fail.'
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - instances
      summary: Create a new instance
      operationId: instances_post
      parameters:
        - enum:
            - true
            - false
          type: string
          default: false
          description: Do not wait for instance to be up and running
          name: no_wait
          in: query
        - description: Specification of the instance to create
          name: details
          in: body
          schema:
            $ref: '#/definitions/InstancesPost'
      responses:
        '202':
          description: Success response of the service
          schema:
            $ref: '#/definitions/OperationResponse'
        '400':
          $ref: '#/responses/ErrorBadRequest'
        '404':
          $ref: '#/responses/ErrorNotFound'
        '500':
          $ref: '#/responses/InternalServerError'
