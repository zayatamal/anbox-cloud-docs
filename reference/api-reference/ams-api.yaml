        type: boolean
        example: false
      unschedulable:
        description: Flag used to see if the node is available to schedule containers
        type: boolean
        example: false
      vpus:
        description: VPU information for the node
        type: array
        items:
          $ref: '#/definitions/NodeVPU'
  NodeDelete:
    description: NodeDelete describes a request used to delete a node
    type: object
    properties:
      force:
        description: Use this to force deletion of a node from AMS and LXD cluster
        type: boolean
        example: true
      keep_in_cluster:
        description: Use this to remove the node from the LXD cluster as well
        type: boolean
        example: true
  NodeGPU:
    description: NodeGPU describes a single GPU available on a node
    type: object
    properties:
      allocations:
        description: Map of current allocations and containers on the GPU
        type: object
        additionalProperties:
          $ref: '#/definitions/NodeGPUAllocation'
      encoder_slots:
        description: Number of the encoder slots available on the GPU
        type: integer
        format: int64
        example: 20
      id:
        description: ID of the GPU configured on the node
        type: integer
        format: uint64
        example: 0
      numa_node:
        description: NUMA Node number for the GPU
        type: integer
        format: uint64
        example: 0
      pci_address:
        description: PCI Bus Address used by the GPU
        type: string
        example: '00:08.0'
      render_name:
        description: PCI Bus Address used by the GPU
        type: string
        example: D129
      slots:
        description: Number of the GPU slots available
        type: integer
        format: int64
        example: 20
      type:
        description: 'Type is the type of the GPU. Possible values are: nvidia, amd,
          intel'
        type: string
        example: nvidia
  NodeGPUAllocation:
    description: NodeGPUAllocation describes a single allocation on a GPU
    type: object
    properties:
      encoder_slots:
        description: Number of Encoder Slots allocated to the container
        type: integer
        format: int64
        example: 1
      gpus:
        description: List of GPU IDs allocated to the container
        type: array
        items:
          type: integer
          format: uint64
        example:
          - 0
          - 1
      slots:
        description: Number of GPU Slots allocated to the container
        type: integer
        format: int64
        example: 1
  NodeGPUPatch:
    description: NodeGPUPatch allows changing configuration for individual GPUs
    type: object
    properties:
      encoder_slots:
        description: Number of GPU encoder slots.
        type: integer
        format: int64
        example: 4
      id:
        description: ID of the GPU configured on the node
        type: integer
        format: uint64
        example: 0
      slots:
        description: Number of GPU slots available on the node.
        type: integer
        format: int64
        example: 20
  NodePatch:
    description: NodePatch describes a request to update an existing node
    type: object
    properties:
      cpu_allocation_rate:
        description: CPU allocation rate used for over-committing resources.
        type: number
        format: float
        x-docs-ref: sec-over-committing
        example: 4
      cpus:
        description: Number of CPUs dedicated to instances.
        type: integer
        format: int64
        example: 4
      gpu_encoder_slots:
        description: 'Number of GPU encoder slots available on the node.

          Default values: 0 for nodes without GPU;

          32 for nodes with NVIDIA GPU;

          5 for nodes with AMD;

          10 for nodes with Intel GPU.'
        type: integer
        format: int64
        x-docs-ref: sec-gpu-slots
        example: 4
      gpu_slots:
        description: Number of GPU slots to configure on the node.
        type: integer
        format: int64
        example: 2
      gpus:
        type: array
        items:
          $ref: '#/definitions/NodeGPUPatch'
      memory:
        description: Update the memory (in GB) for the node.
        type: string
        example: 2GB
      memory_allocation_rate:
        description: Memory allocation rate used for over-committing resources.
        type: number
        format: float
        x-docs-ref: sec-over-committing
        example: 2
      public_address:
        description: The public, reachable address of the node.
        type: string
        format: ipv4
        example: 10.0.0.1
      subnet:
        description: The network subnet of the machine hosting the node.
        type: string
        format: ipv4
        example: 10.0.0.1/24
      tags:
        description: Tags to identify the node.
        type: array
        items:
          type: string
        example:
          - created_by=anbox
          - gpu=nvidia
      unscheduable:
        description: DEPRECATED Flag in favour of `unschedulable` flag.
        type: boolean
        x-deprecated-since: '1.20'
        example: false
      unschedulable:
        description: When set to `true`, the node cannot be scheduled, which prevents
          new instances from being launched on it.
        type: boolean
        example: true
  NodeStatus:
    description: NodeStatus describes the current status of a node
    type: integer
    format: int64
  NodeVPU:
    description: NodeVPU describes a single independent VPU available on a node
    type: object
    properties:
      allocations:
        description: Map of current allocations on the VPU
        type: object
        additionalProperties:
          $ref: '#/definitions/NodeVPUAllocation'
      id:
