  /1.0/containers:
    get:
      description: This endpoint returns a list of container API endpoints.
      produces:
        - application/json
      tags:
        - containers
      summary: Get a list of containers
      operationId: containers_get
      parameters:
        - enum:
            - 0
            - 1
          type: integer
          default: 0
          description: Attach current identity's entitlements for the resource.
          name: entitlements
          in: query
        - type: integer
          description: Maximum number of containers to provide
          name: limit
          in: query
        - type: integer
          description: Offset at which to start with listing containers
          name: offset
          in: query
        - enum:
            - 0
            - 1
          type: integer
          default: 0
          description: Expand the returned resource definition
          name: recursion
          in: query
        - type: string
          example: cilsreunfpfec9b1ktg0
          description: Filter containers by id. This is an exact match for the string.
          name: id
          in: query
        - type: string
          example: ams-cilsreunfpfec9b1ktg0
          description: Filter containers by name. This is an exact match for the string.
          name: name
          in: query
        - enum:
            - base
            - regular
          type: string
          description: Filter containers by type.
          name: type
          in: query
        - enum:
            - created
            - prepared
            - stopped
            - running
            - error
            - deleted
          type: string
          description: Filter containers by status.
          name: status
          in: query
        - type: string
          example: lxd0
          description: Filter containers by the LXD node name.
          name: node
          in: query
        - type: string
          example: cilsiomnfpfec9b1kteg
          description: Filter containers by the application ID. This is an exact match
            for the string.
          name: app_id
          in: query
        - type: string
          example: my-app
          description: Filter containers by the application name. This is an exact
            match for the string.
          name: app_name
          in: query
        - type: integer
          example: 0
          description: Filter containers by the application version.
          name: app_version
          in: query
        - type: string
          example: cilsiomnfpfec9b1kteg
          description: Filter containers by the image ID. This is an exact match for
            the string.
          name: image_id
          in: query
        - type: integer
          example: 0
          description: Filter containers by the image version.
          name: image_version
          in: query
        - type: string
          example: created_by=anbox,foo,bar
          description: Filter containers by tags.
          name: tags
          in: query
      responses:
        '200':
          description: API endpoints
          schema:
            type: object
            allOf:
              - $ref: '#/definitions/NoMetaSyncResponse'
            properties:
              metadata:
                description: List of endpoints
                type: array
                items:
                  type: string
                example: "[\n  \"/1.0/containers/foo\",\n  \"/1.0/containers/bar\"\
                  \n]"
        '400':
          $ref: '#/responses/ErrorBadRequest'
        '404':
          $ref: '#/responses/ErrorNotFound'
        '500':
          $ref: '#/responses/InternalServerError'
    post:
      description: 'This endpoint creates a new container instance with the provided
        specification.

        If AMS cannot fullfil the resource requirements for creating the instance,

        the request will fail.'
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - containers
      summary: Create a new container instance
      operationId: containers_post
      parameters:
        - enum:
            - true
            - false
          type: string
          default: false
          description: Do not wait for instance to be up and running
          name: no_wait
          in: query
        - description: Specification of the container to create
          name: details
          in: body
          schema:
            $ref: '#/definitions/ContainersPost'
      responses:
        '202':
          description: Success response of the service
          schema:
            $ref: '#/definitions/OperationResponse'
        '400':
          $ref: '#/responses/ErrorBadRequest'
        '404':
          $ref: '#/responses/ErrorNotFound'
        '500':
          $ref: '#/responses/InternalServerError'
    delete:
      description: 'This endpoint deletes all specified containers. If the deletion
        of a single

        container fails, the operation is aborted and an error is returned.'
      consumes:
        - application/json
      produces:
        - application/json
      tags:
        - containers
      summary: Delete multiple containers.
      operationId: containers_delete
      parameters:
        - description: List of containers to delete
          name: details
          in: body
          schema:
            $ref: '#/definitions/ContainersDelete'
      responses:
        '202':
          description: Success response of the service
          schema:
            $ref: '#/definitions/OperationResponse'
        '400':
          $ref: '#/responses/ErrorBadRequest'
        '404':
          $ref: '#/responses/ErrorNotFound'
        '500':
          $ref: '#/responses/InternalServerError'
  /1.0/containers/{id}:
    get:
      description: This endpoint returns information about a specific container instance.
      produces:
        - application/json
      tags:
        - containers
      summary: Get information about a specific container instance.
      operationId: container_get
      parameters:
        - type: string
          name: id
          in: path
          required: true
