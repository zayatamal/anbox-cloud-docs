        type: string
      type:
        description: Type of the share
        type: string
      url:
        description: URL is the endpoint to reach to start the WebRTC signaling process
        type: string
  InstanceSource:
    type: object
    title: InstanceSource represents the source for creating a new instance (e.g.,
