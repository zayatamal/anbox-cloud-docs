            description: Number of CPU cores the instance should get assigned.
            type: integer
            format: int64
            example: 4
          disk_size:
            description: Disk size the instance should get allocated in bytes
            type: integer
            format: int64
            example: 3221225472
          gpu-slots:
            description: Number of GPU slots the instance should get assigned.
            type: integer
            format: int64
            example: 1
          gpu-type:
            description: 'Type of the GPU to select for the instance. If not given
              the

              GPU with the minimum usage is assigned to the instance on the

              node it is scheduled on. Possible values are: amd, intel, nvidia'
            type: string
            example: amd
          memory:
            description: Memory the instance should get assigned in bytes.
