        type: integer
        format: uint64
      model:
        description: Model name of the VPU
        type: string
      numa_node:
        description: NUMA node the card sits on
        type: integer
        format: uint64
      slots:
        description: Number of slots available on the VPU
        type: integer
        format: int64
      type:
        description: 'Type of the VPU. Valid values are: unknown, netint'
        type: string
  NodeVPUAllocation:
    description: NodeVPUAllocation describes a single allocation for a VPU
    type: object
    properties:
      ids:
        description: VPU IDs the allocation is for
        type: array
        items:
          type: integer
          format: uint64
      slots:
        description: Number of slots used by this allocation
        type: integer
        format: int64
  NodesPost:
    description: NodesPost describes a request to create a new node on AMS
    type: object
    properties:
      address:
        description: Internal IP address of the node
        type: string
        format: ipv4
        example: 10.0.0.1
      cpu_allocation_rate:
        description: CPU allocation rate for the node
        type: number
        format: float
        example: 4
      cpus:
        description: Number of CPUs on the node
        type: integer
        format: int64
        example: 4
      gpu_encoder_slots:
        description: Number of GPU encoder slots to configure on the node
        type: integer
        format: int64
        example: 4
      gpu_slots:
        description: Number of GPU slots to configure on the node
        type: integer
        format: int64
        example: 2
      memory:
        description: Memory (in GB) of the node
        type: string
        example: 8GB
      memory_allocation_rate:
        description: Memory allocation rate for the node
        type: number
        format: float
        example: 2
      name:
        description: Name of the node
        type: string
        example: lxd0
      network_acl_name:
        description: Name of the network ACL to create on the LXD node
        type: string
        example: ams0
      network_bridge_mtu:
        description: MTU for the configured network bridge on LXD
        type: integer
        format: int64
        example: 1500
      network_name:
        description: Name of the network bridge to create on the LXD node
        type: string
        example: amsbr0
      network_subnet:
        description: CIDR of the subnet to configure for the network bridge on LXD
        type: string
        format: ipv4
        example: 10.0.0.0/24
      public_address:
        description: Public IP address of the node
        type: string
        format: ipv4
        example: 10.0.0.1
      storage_device:
        description: Storage device to use for configuring LXD storage pools
        type: string
        example: /dev/sdb
      storage_pool:
        description: Name of the storage pool to use for configuring the LXD node
        type: string
        example: default
      tags:
        description: Tags to attach to the node
        type: array
        items:
          type: string
        example:
          - created_by=anbox
          - gpu=nvidia
      trust_password:
        description: Trust password for the LXD instance
        type: string
        example: sUp3rs3cr3t
      trust_token:
        description: Trust token for the LXD instance
        type: string
        example: csdflkj3lks
      unmanaged:
        description: Flag used to control if AMS can manage the LXD node
        type: boolean
        example: false
  OIDCResponse:
    description: OIDCResponse represents the OIDC configuration accepted by AMS
    type: object
    properties:
      audience:
        description: 'Audience to use when using flows that do not require a client_secret
          on

          identity provider e.g Device flow grant.'
        type: string
        example: http://ams.example.com
      client_id:
        description: 'ClientID to use when using flows that do not require a client_secret
          on

          identity provider e.g Device flow grant.'
        type: string
        example: web
      issuer:
        description: Issuer URL as configured in AMS
        type: string
        example: '"https://myauth.auth0.com/"'
      required_scopes:
        description: 'Required Scope for AMS to work. These scopes should be request
          by clients

          when performing OIDC based authentication with an Identity Provider.'
        type: array
        items:
          type: string
        example:
          - openid
          - email
          - profile
  Operation:
    description: Operation represents a background operation
    type: object
    properties:
      class:
        description: Class of the operation
        type: string
        enum:
          - task
          - websocket
          - token
        example: task
      created_at:
        description: When the operation was created
        type: string
        format: date-time
      description:
        description: Human readable description of the operation
        type: string
        example: updating addon 3apqo5te
      err:
        description: The error string if the operation failed
        type: string
      id:
        description: UUID of the operation
        type: string
        example: c6832c58-0867-467e-b245-2962d6527876
      may_cancel:
        description: Whether this operation can be canceled (DELETE over REST)
        type: boolean
        example: false
      metadata:
        description: Metadata related to the operation and affected resources
        type: object
        additionalProperties: {}
        example: {}
      resources:
        description: 'Dictionnary of resource types (containers, snapshots, images)

          and affected resources'
        type: object
        additionalProperties:
          type: array
          items:
            type: string
        example:
          applications:
            - /1.0/applications/my-app
      server_address:
        description: The address of the server where the operation ran
        type: string
        format: ipv4
      status:
        description: String version of the operation status
        type: string
        example: Running
      status_code:
        $ref: '#/definitions/StatusCode'
      updated_at:
        description: When the operation was updated
        type: string
        format: date-time
  OperationResponse:
    description: Operation
    type: object
    properties:
      metadata:
        $ref: '#/definitions/Operation'
      operation:
        type: string
        example: /1.0/operations/66e83638-9dd7-4a26-aef2-5462814869a1
      status:
        type: string
        example: Operation created
      status_code:
        type: integer
        format: int64
        example: 100
      type:
        type: string
        example: async
  Permission:
    type: object
    title: Permission represents a structure defining a permission within AMS.
    properties:
      entitlement:
        description: Entitlement represents the type of action allowed on a resource
        type: string
        example: can_edit
      resource:
        description: 'Resource represents the object on which a permission is being
          assigned.

          The resource can be for the format `<resource_type>:<resource_id>` or `server`

          `server` is a special resource used to assign permissions globally for the
          server.'
        type: string
        example: instance:foo
  RegistryApplication:
    description: RegistryApplication describes a single application available in the
      registry
    type: object
    properties:
      architectures:
        type: array
        items:
          type: string
      boot_package:
        type: string
      instance_type:
        type: string
      name:
        type: string
      tags:
        type: array
        items:
          type: string
      versions: {}
      vm:
        type: boolean
  Response:
    description: Response is a standard response for AMS API operations
    type: object
    properties:
      error:
        type: string
      status:
        type: string
      status_code:
        type: integer
        format: int64
  ServiceStatus:
    description: ServiceStatus represents the status of the AMS service
    type: object
    properties:
      api_extensions:
        description: List of supported features for the service version running
        type: array
        items:
          type: string
        example:
          - addon_restore_hook
          - container_logs
          - registry
      api_status:
        description: Shows the API stability status
        type: string
        example: stable
      api_version:
        description: API version for the service
        type: string
        example: '1.0'
      auth:
        description: Used to see if the client is trusted. Can be `trusted` or `untrusted`.
        type: string
        example: untrusted
      auth_methods:
        description: Authentication method used for the requests.
        type: array
        items:
          type: string
        example: 2waySSL
      auth_permissions:
        description: Lists the valid entitlements per resource type in AMS.
        type: object
        additionalProperties:
          type: array
          items:
            type: object
            additionalProperties:
              type: string
        example:
          server:
            - description: Grants access to view server config
              entitlement_name: can_view_config
      cluster_id:
        description: ID of the subcluster the AMS instance is part of
        type: string
        example: cilsreunfpfec9b1ktg0
      cluster_name:
        description: Name of the subcluster the AMS instance is part of
        type: string
        example: prod0
  SourceType:
    description: SourceType describes the source type of an instance
    type: string
  StatusCode:
    description: StatusCode represents a valid REST operation
    type: integer
    format: int64
  Task:
    description: Task is the scheduling unit AMS uses for container launches
    type: object
    properties:
      id:
        description: ID of the task
        type: string
        example: c055dl0j1qm027422feg
      object_id:
        description: ID of the object that the task is operating on
        type: string
        example: c055dl0j1qm027422fe0
      object_type:
        description: Type of the object that the task is operating on
        type: string
        example: container
      status:
        description: Status of the task
        type: string
        enum:
          - created
          - prepared
          - started
          - running
          - stopped
          - shutdown
          - completed
          - error
          - deleted
          - unknown
        example: running
  VersionGet:
    description: VersionGet is the JSON response from the API version request method
    type: object
    properties:
      version:
        type: string
  VersionResponse:
    description: VersionResponse shows the version for the running service
    type: object
    properties:
      version:
        description: Version of the service
        type: string
        example: 1.18.2
  VideoEncoderType:
    description: VideoEncoderType describes the type of a video encoder is used by
      an application
    type: string
