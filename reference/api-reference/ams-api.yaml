          type: string
        example:
          - android.permission.WRITE_EXTERNAL_STORAGE
          - android.permission.READ_EXTERNAL_STORAGE
      resources:
        $ref: '#/definitions/ApplicationResourcesPost'
      services:
        description: 'List of services exposed by the application that should be expose
