        type: string
        example: amd
      memory:
        description: Memory to be assigned to the application
        type: string
        example: 3GB
      no_disk_reserve:
        description: NoDiskReserve defines whether to skip reserving the full disk
          quota upfront
        type: boolean
      vpu-slots:
        description: Number of VPU slots required by the application
        type: integer
        format: int64
        example: 1
  ApplicationResourcesPost:
    description: ApplicationResourcesPost represents the fields used to update an
      application resource
    type: object
    properties:
      cpus:
        description: Number of CPUs required by the application
        type: integer
        format: int64
        example: 2
      disk-size:
        description: Storage size required by the application
        type: string
        example: 3GB
      gpu-slots:
        description: Number of GPU slots required by the application
        type: integer
        format: int64
        example: 2
      gpu-type:
        description: 'Type of the GPU to select for the instance. If not given the

          GPU with the minimum usage is assigned to the instance on the

          node it is scheduled on. Possible values are: amd, intel, nvidia'
        type: string
        example: amd
      memory:
        description: Memory to be assigned to the application
        type: string
        example: 3GB
      no_disk_reserve:
        description: NoDiskReserve defines whether to skip reserving the full disk
          quota upfront
        type: boolean
      vpu-slots:
        description: Number of VPU slots required by the application
        type: integer
        format: int64
        example: 1
  ApplicationStatus:
    description: ApplicationStatus represents the status an application can be in
    type: integer
    format: int64
  ApplicationVersion:
    description: ApplicationVersion describes a single version of an application
    type: object
    properties:
      addons:
        description: List of addons enabled for the version
        type: array
        items:
          $ref: '#/definitions/ApplicationAddon'
      boot_activity:
        description: Name of the boot package for the version
        type: string
        example: com.foo.bar.MainActivity
      bootstrap:
        $ref: '#/definitions/ApplicationBootstrap'
      created_at:
        description: Creation UTC timestamp of the version
        type: integer
        format: int64
        example: 1532150640
      error_message:
        description: Error message in case the application ran into an error
        type: string
        example: '{}'
      extra_data:
        description: Extra data to be setup on the instance on application creation
        type: object
        additionalProperties:
          $ref: '#/definitions/ApplicationExtraData'
        example: {}
      features:
        description: List of features supported by the application
        type: array
        items:
          type: string
        example:
          - feature1
          - feature2
      hooks:
        $ref: '#/definitions/ApplicationHooks'
      manifest_version:
        description: Version of the manifest used to create the application
        type: string
        example: '0.1'
      number:
        description: Version of the application
        type: integer
        format: int64
        example: 0
      parent_image_id:
        description: Parent image used for the application version
        type: string
        example: btavtegj1qm58qg7ru50
      parent_image_version:
        description: Parent image version to use for the application version
        type: integer
        format: int64
        example: 0
      published:
        description: Whether or not the version is published
        type: boolean
        example: false
      required_permissions:
        description: Required android application permissions
        type: array
        items:
          type: string
        example:
          - android.permission.WRITE_EXTERNAL_STORAGE
          - android.permission.READ_EXTERNAL_STORAGE
      services:
        description: List of services exposed by the application that should be exposed
          on the instance
        type: array
        items:
          $ref: '#/definitions/NetworkServiceSpec'
      status:
        description: Current status of the version
        type: string
        enum:
          - initializing
          - unknown
          - ready
          - deleted
          - error
        example: deleted
      status_code:
        $ref: '#/definitions/ImageStatus'
      video_encoder:
        $ref: '#/definitions/VideoEncoderType'
      watchdog:
        $ref: '#/definitions/ApplicationWatchdog'
  ApplicationVersionDelete:
    description: ApplicationVersionDelete represents the fields used to delete an
      application version
    type: object
    properties:
      force:
        description: Whether deletion of the application version should be forced
        type: boolean
        example: false
  ApplicationVersionPatch:
    description: ApplicationVersionPatch represents the fields used to update an application
      version
    type: object
    properties:
      published:
        description: Used to publish a specific version of the application
        type: boolean
        example: true
  ApplicationWatchdog:
    description: ApplicationWatchdog describes the fields used to update an application
      watchdog
    type: object
    properties:
      allowed-packages:
        description: List of android packages to enable the watchdog for
        type: array
        items:
          type: string
        example:
          - com.android.settings
      disabled:
        description: Whether or not to enable the watchdog for the application
        type: boolean
        example: true
  ApplicationsDelete:
    description: ApplicationsDelete represents a list of application to delete together
    type: object
    properties:
      force:
        description: Whether deletion of the applications should be forced
        type: boolean
        example: false
      ids:
        description: IDs or names of the applications to delete
        type: array
        items:
          type: string
        example:
          - cilsreunfpfec9b1ktg0
          - cilsreunfpfec9b1ktg1
          - myapp
  AuthGroup:
    type: object
    title: AuthGroup is the type for an AMS authorization group.
    properties:
      created_at:
        description: CreatedAt specifies the time at which the group was created.
          The value is a UTC timestamp.
        type: integer
        format: int64
        example: 1689604498
      description:
        description: Description is a short description of the group.
        type: string
        example: Developers of application foo.
      entitlements:
        description: Entitlements lists the current identity's entitlements on this
          group
        type: array
        items:
          type: string
        example:
          - can_view
          - can_edit
      identities:
        description: Identities is a list of authentication method to slice of group
          identifiers.
        type: array
        items:
          type: string
      immutable:
        description: Immutable defines whether a group is immutable and cannot be
          deleted or renamed
        type: boolean
        example: false
      name:
        description: Name is the name of the group.
        type: string
        example: default-c1-viewers
      permissions:
        description: Permissions represent the list of permissions assigned to an
          auth group
        type: array
        items:
          $ref: '#/definitions/Permission'
        example:
          - entitlement: can_view
            resource: application:foo
          - entitlement: can_edit
            resource: instance:bar
      updated_at:
        description: UpdatedAt specifies the time at which the group was last updated.
          The value is a UTC timestamp.
        type: integer
        format: int64
        example: 1689604498
  AuthGroupDelete:
    description: AuthGroupDelete represent the body in a delete method
    type: object
    properties:
      force:
        description: Force allows the group to be deleted even if it is a part of
          groups
        type: boolean
        example: true
  AuthGroupPost:
    type: object
    title: AuthGroupPost is used for creating a group.
    properties:
      description:
        description: Description is a short description of the group.
        type: string
        example: Developers of application foo.
      name:
        description: Name is the name of the group.
        type: string
        example: default-c1-viewers
  AuthGroupPut:
    type: object
    title: AuthGroupPut replaces the editable fields for an auth group with the required
      values.
    properties:
      description:
        description: Description is a short description of the group.
        type: string
        example: Developers of application foo.
      permissions:
        description: Permissions represent the list of permissions assigned to an
          auth group
        type: array
        items:
          $ref: '#/definitions/Permission'
        example:
          - entitlement: can_view
            resource: application:foo
          - entitlement: can_edit
            resource: instance:bar
  Certificate:
    description: Certificate represents an available client certificate
    type: object
    properties:
      certificate:
        description: Base64 encoded certificate content without the header or the
          footer
        type: string
        example: MIIFUTCCAzmgAw...xjKoUEEQOzJ9
      fingerprint:
        description: SHA-256 fingerprint of the certificate
        type: string
        example: b94d27b9934d3e08a52e52d7da7dabfac484efe37a5380ee9088f7ace2efcde9
  CertificatesPost:
    description: CertificatesPost represents the fields of a new auth provided certificate
    type: object
    properties:
      certificate:
        description: Base64 encoded certificate content without the header or the
          footer
        type: string
        example: MIIFUTCCAzmgAw...xjKoUEEQOzJ9
      trust-password:
        description: TrustPassword is used to register a new client with the service
        type: string
        example: sUp3rs3cr3t
  CollectionResponse:
    description: Collection Response
    allOf:
      - $ref: '#/definitions/NoMetaSyncResponse'
      - type: object
        properties:
          total_size:
            description: Total Count of the collection
            type: integer
            format: int64
            example: 99
  ConfigItem:
    description: ConfigItem represents a single configuration item
    type: object
    properties:
      name:
        type: string
      value:
        type: string
  ConfigPost:
    description: ConfigPost contains the field necessary to set or update a config
      item
    type: object
    properties:
      name:
        type: string
        example: application.auto_publish
      value:
        type: string
        example: 'false'
  Container:
    description: Container represents a single container
    type: object
    properties:
      address:
        description: Address is the IP address of the container
        type: string
        example: 192.168.1.74
      app_id:
        description: 'AppID is the ID of the application the container is created
          from. Empty if the

          container has not been created from an application.'
        type: string
        example: cilsiomnfpfec9b1kteg
      app_name:
        description: 'AppName is the name of the application the container is created
          from. Empty if the

          container has not been created from an application.'
        type: string
        example: myapp
      app_version:
        description: 'AppVersion is the version of the application the container is
          created from. Empty if the

          container has not been created from an application.'
        type: integer
        format: int64
        example: 0
      architecture:
        description: Architecture describes the CPU archtitecture the container is
          using
        type: string
        example: aarch64
      config:
        description: Config summarizes the configuration the container uses
        type: object
        properties:
          boot_activity:
            description: BootActivity specifies the Android activity which is started
              by default
            type: string
            example: com.android.settings/.DevSettings
          boot_package:
            description: BootPackage specifies the Android application package name
              which is started by default
            type: string
            example: com.android.settings
          devmode:
            description: DevMode specifies if development mode has been turned on
              for the container
            type: boolean
          disable_watchdog:
            description: DisableWatchdog defines whether the watchdog is disabled
            type: boolean
          metrics_server:
            description: MetricsServer specifies a metrics server the container will
              use
            type: string
            example: 10.0.0.45:8086
          platform:
            description: Platform specifies the Anbox platform the container is running
              with
            type: string
            example: webrtc
      created_at:
        description: CreatedAt specifies the time at which the container was created
        type: integer
        format: int64
        example: 1689604498
      entitlements:
        description: Entitlements lists the current identity's entitlements on this
          container
        type: array
        items:
          type: string
        example:
          - can_view
          - can_edit
      error_message:
        description: ErrorMessage provides an error message when the container status
          is set to error.
        type: string
        example: container failed to boot
      id:
        description: ID of the container
        type: string
        example: cilsreunfpfec9b1ktg0
      image_id:
        description: 'ImageID is the ID of the image the container is created from.
          Empty if the

          container has not been created from an image.'
        type: string
        example: cilshrmnfpfec9b1kte0
      image_version:
        description: 'ImageVersion is the version of the image the container is created
          from. Empty if the

          container has not been created from an image.'
        type: integer
        format: int64
        example: 0
      name:
        description: Name of the container. Typically in the format "ams-<ID>".
        type: string
        example: ams-cilsreunfpfec9b1ktg0
      node:
        description: Node the container is running on
        type: string
        example: lxd0
      public_address:
        description: 'PublicAddress is the external IP address the container is accessible
          on (in most

          cases the IP of the node it is running on)'
        type: string
        example: 1.2.3.4
      resources:
        description: Resources specifies the resources allocated for the container
        type: object
        properties:
          cpus:
            description: CPUs cores assigned to the container
            type: integer
            format: int64
            example: 2
          disk-size:
            description: DiskSize specifies the amount of storage assigned to the
              container
            type: string
            example: 3GB
          gpu-slots:
            description: GPUSlots specifies the number of GPU slots the container
              got allocated
            type: integer
            format: int64
            example: 1
          memory:
            description: Memory assigned to the container
            type: string
            example: 3GB
          vpu-slots:
            description: VPUSlots specifies the number of VPU slots the container
            type: integer
            format: int64
      services:
        description: Services the container exposes
        type: array
        items:
          $ref: '#/definitions/ContainerService'
      status:
        description: Status of the container
        type: string
        example: running
      status_code:
        $ref: '#/definitions/ContainerStatus'
      stored_logs:
        description: StoredLogs lists log files AMS stores for the container.
        type: array
        items:
          type: string
        example:
          - android.log
          - system.log
      tags:
        description: Tags specifies the tags the container has assigned
        type: array
        items:
          type: string
        example:
          - foo
          - bar
      type:
        $ref: '#/definitions/ContainerType'
  ContainerDelete:
    description: ContainerDelete describes a request used to delete a container
    type: object
    properties:
      force:
        description: Whether deletion of the container should be forced
        type: boolean
  ContainerExecControl:
    description: ContainerExecControl represents a message on the container shell
      "control" socket
    type: object
    properties:
      args:
        description: Arguments to pass to the command
        type: object
        additionalProperties:
          type: string
        example:
          height: 720
          width: 1280
      command:
        description: 'Command to execute. Possible values are: window-resize, signal'
        type: string
        example: window-resize
      signal:
        description: Signal to send
        type: integer
        format: int64
  ContainerExecPost:
    description: ContainerExecPost represents an container execution request
    type: object
    properties:
      command:
        description: Command inside the container to execute
        type: array
        items:
          type: string
        example: /bin/ls
      environment:
        description: Environment to setup when the command is executed.
        type: object
        additionalProperties:
          type: string
        example:
          FOO: bar
      height:
        description: Height of the terminal. Only required when `interactive` is set
          to `true`.
        type: integer
        format: int64
      interactive:
        description: Whether the command is executed interactively or not
        type: boolean
      width:
        description: Width of the terminal. Only required when `interactive` is set
          to `true`.
        type: integer
        format: int64
  ContainerPatch:
    description: ContainerPatch describes the fields which can be changed for an existing
      container
    type: object
    properties:
      desired_status:
        description: Desired status of the container
        type: string
  ContainerService:
    description: 'While NetworkServiceSpec defines what the user requests, ContainerService
      is what is actually

      opened on the container.'
    type: object
    title: ContainerService describes a single service the container exposes to the
      outside world.
    properties:
      expose:
        description: 'Expose defines wether the service is exposed on the public endpoint
          of the node

          or if it is only available on the private endpoint. To expose the service
          set to

          true and to false otherwise.'
        type: boolean
      name:
        description: 'Name gives the container a hint what the exposed port is being
          used for. This

          allows further tweaks inside the container to expose the service correctly.'
        type: string
        example: myservice
      node_port:
        description: 'NodePort is the port used on the LXD node to map to the service
          port

          If left empty the node port is automatically selected.'
        type: integer
        format: int64
        example: 4000
      node_port_end:
        description: 'NodePortEnd, if specified, denotes the end of the port range
          on the node starting

          at NodePort'
        type: integer
        format: int64
        example: 4010
      port:
        description: Port is the port the container provides a service on
        type: integer
        format: int64
        example: 3000
      port_end:
        description: PortEnd, if specified, denotes the end of the port range starting
          at Port
        type: integer
        format: int64
        example: 3010
      protocols:
        description: List of network protocols (tcp, udp) the port should be exposed
          for
        type: array
        items:
          $ref: '#/definitions/NetworkProtocol'
        example:
          - tcp
          - udp
  ContainerStatus:
    description: ContainerStatus represents the status a container can be in
    type: integer
    format: int64
  ContainerType:
    description: 'Possible values are: regular, base, unknown'
    type: string
    title: ContainerType describes the type of a container.
  ContainersDelete:
    description: ContainersDelete represents a list of containers to delete together
    type: object
    properties:
      force:
        description: Whether deletion of the containers should be forced
        type: boolean
      ids:
        description: IDs of the containers to delete
        type: array
        items:
          type: string
        example:
          - cilsreunfpfec9b1ktg0
          - cilsreunfpfec9b1ktg1
  ContainersPost:
    description: 'ContainersPost represents the fields required to launch a new container
      for

      a specific application'
    type: object
    properties:
      addons:
        description: Addons to enable for the container
        type: array
        items:
          type: string
        example:
          - addon0
          - addon1
      app_id:
        description: ID of the application to use. Can be empty if an image ID is
          specified instead
        type: string
        example: cilsiomnfpfec9b1kteg
      app_version:
        description: Version of the application to use. If not specified, the latest
          version is used.
        type: integer
        format: int64
        example: 0
      config:
        type: object
        properties:
          boot_activity:
            description: BootActivity specifies the Android activity which is started
              by default
            type: string
            example: com.android.settings/.DevSettings
          boot_package:
            description: BootPackage specifies the Android application package name
              which is started by default
            type: string
            example: com.android.settings
          devmode:
            description: DevMode specifies if development mode has been turned on
              for the container
            type: boolean
          disable_watchdog:
            description: DisableWatchdog defines whether the watchdog is disabled
            type: boolean
          features:
            description: Feature flags to enable for the container.
            type: string
            example: feature0, feature1
          metrics_server:
            description: MetricsServer specifies a metrics server the container will
              use
            type: string
            example: 10.0.0.45:8086
          platform:
            description: Platform specifies the Anbox platform the container is running
              with
            type: string
            example: webrtc
      cpus:
        description: Number of CPU cores the container should get assigned.
        type: integer
        format: int64
        example: 4
      disk_size:
        description: Disk size the container should get allocated in bytes
        type: integer
        format: int64
        example: 3221225472
      gpu-slots:
        description: Number of GPU slots the container should get assigned.
        type: integer
        format: int64
        example: 1
      image_id:
        description: ID of the image to use. Can be empty if an application ID is
          specified instead.
        type: string
        example: cilshrmnfpfec9b1kte0
      image_version:
        description: Version of the image to use. If not specified, the latest version
          is used.
        type: integer
        format: int64
        example: 0
      instance_type:
        description: 'Instance type to use for the container.

          Example a2.3'
        type: string
      memory:
        description: Memory the container should get assigned in bytes.
        type: integer
        format: int64
        example: 3221225472
      no_start:
        description: Do not start the container after creation.
        type: boolean
      node:
        description: Node to start the container on. If empty node will be automatically
          selected.
        type: string
        example: lxd0
      services:
        description: Services to enable for the container
        type: array
        items:
          $ref: '#/definitions/NetworkServiceSpec'
      tags:
        description: Tags which will be assigned to the container
        type: array
        items:
          type: string
        example:
          - tag0
          - tag1
      user_data:
        description: User data to pass to the container.
        type: string
        example: '{\"key\":\"value\"}'
      vpu-slots:
        description: Number of VPU slots the container should get assigned
        type: integer
        format: int64
        example: 1
  Event:
    description: Event defines the structure of an event sent on the events API endpoint
    type: object
    properties:
      metadata:
        description: Metadata represents the actual event data
        example: '{ "class": "task", "created_at": "2017-07-28T05:02:22.92201407Z",
          "description": "Deleting container", "err": "", "id": "bc85137b-b20d-470a-a6ea-daa9a2b8506a",
          "may_cancel": false, "metadata": null, "resources": { "containers": [ "/1.0/containers/c0946voj1qm6t2783db0"
          ] }, "server_address": "", "status": "Success", "status_code": 200, "updated_at":
          "2017-07-28T05:02:22.92201407Z" }'
      timestamp:
        description: Timestamp (in ISO8601 format) is filled when sending the event
          if empty
        example: '2017-07-28T05:02:22.92201407Z'
      type:
        description: 'Type defines the type of event. Listeners can watch specific

          event types'
        type: string
        enum:
          - operation
          - lifecycle
  EventAuth:
    description: EventAuth defines the structure of the response sent as metadata
      for events authentication endpoint
    type: object
    properties:
      token:
        description: Token represents a signed JWT token issued by AMS.
        type: string
  Identity:
    type: object
    title: Identity represents an authenticated party that can make requests to the
      HTTPS API.
    properties:
      authentication_method:
        description: 'The authentication method that the identity

          authenticates to AMS with.'
        type: string
        example: tls
      certificate:
        description: Base64 encoded certificate content without the header or the
          footer (for TLS based identities)
        type: string
        example: MIIFUTCCAzmgAw...xjKoUEEQOzJ9
      created_at:
        description: CreatedAt specifies the time at which the identity was created
        type: integer
        format: int64
        example: 1689604498
      email:
        description: Email of the new user for OIDC based identities
        type: string
        example: john.doe@example.com
      entitlements:
        description: Current identity's entitlements on the object
        type: array
        items:
          type: string
        example:
          - can_edit
          - can_view
      fingerprint:
        description: The certificate fingerprint for TLS based identities
        type: string
      groups:
        description: The list of groups for which the identity is a member.
        type: array
        items:
          type: string
        example:
          - foo
          - bar
      id:
        description: A unique identifier for the identity
        type: string
        example: btavtegj1qm58qg7ru50
      name:
        description: Name of the new user
        type: string
        example: john-doe
      updated_at:
        description: UpdatedAt specifies the time at which the identity was last updated
        type: integer
        format: int64
        example: 1689604498
  IdentityDelete:
    description: IdentityDelete represent the body in a delete method
    type: object
    properties:
      force:
        description: Force allows the identity to be deleted even if it is a part
          of groups
        type: boolean
        example: true
  IdentityPost:
    description: IdentityPost is the input body adding for an identity
    type: object
    properties:
      authentication_method:
        description: AuthenticationMethod is the method used to authenticate the identity
        type: string
        example: oidc
      certificate:
        description: Base64 encoded certificate content without the header or the
          footer (for TLS based identities)
        type: string
        example: MIIFUTCCAzmgAw...xjKoUEEQOzJ9
      email:
        description: Email of the new user (for OIDC based identities)
        type: string
        example: john.doe@example.com
      name:
        description: Name of the new identity
        type: string
        example: john-doe
  IdentityPut:
    type: object
    title: IdentityPut contains the editable fields of an Identity.
    properties:
      groups:
        description: Groups is the list of groups for which the identity is a member.
        type: array
        items:
          type: string
        example:
          - foo
          - bar
  Image:
    description: Image represents an image available in AMS
    type: object
    properties:
      architecture:
        description: CPU architecture supported by the image
        type: string
        example: x86_64
      capabilities:
        description: Capabilities of the image
        type: array
        items:
          type: string
        example:
          - gpu
          - camera
      default:
        description: Flag to show whether the image is used by default if no image
          name is provided
        type: boolean
        example: false
      entitlements:
        description: List of entitlements the user has for this image
        type: array
        items:
          type: string
        example:
          - can_view
          - can_edit
      id:
        description: ID of the image
        type: string
        example: btavtegj1qm58qg7ru50
      immutable:
        description: Flag to show whether the image can be edited by an AMS instance
          or not
        type: boolean
        example: false
      name:
        description: Name of the image
        type: string
        example: my-image
      status:
        description: Current status of the image
        type: string
        enum:
          - error
          - created
          - active
          - initializing
          - unknown
        example: active
      status_code:
        $ref: '#/definitions/ImageStatus'
      type:
        $ref: '#/definitions/ImageType'
      used_by:
        description: List of application ids using the image as a base
        type: array
        items:
          type: string
        example:
          - btavtegj1qm58asf123
      variant:
        description: 'Variant of the image. Possible values are: android, aaos, generic,
          unknown'
        type: string
      versions:
        description: List of versions for the image
        type: array
        items:
          $ref: '#/definitions/ImageVersion'
  ImageDelete:
    description: ImageDelete describes a request used to delete an image
    type: object
    properties:
      force:
        type: boolean
  ImagePatch:
    description: ImagePatch represents the fields to update an existing image
    type: object
    properties:
      default:
        description: Make the image as default
        type: boolean
        example: true
      force_sync:
        description: 'ForceSync forces synchronization of the image from the remote
          image server

          Examle: true'
        type: boolean
  ImageStatus:
    description: ImageStatus represents the status of an image
    type: integer
    format: int64
  ImageType:
    description: ImageType specifies the type of an image
    type: string
  ImageVersion:
    description: ImageVersion describes a single version of an image
    type: object
    properties:
      created_at:
        description: Creation UTC timestamp of the image
        type: integer
        format: int64
        example: 1610641117
      error_message:
        description: 'ErrorMessage describes a potential error which has occured while

          downloading the image.'
        type: string
      fingerprint:
        description: Fingerprint of the image version
        type: string
        example: 0791cfc011f67c60b7bd0f852ddb686b79fa46083d9d43ef9845c9235c67b261
      remote_id:
        description: Version of the image in the remote server
        type: string
        example: 1.2.3
      size:
        description: Size (in bytes) of the image version
        type: integer
        format: int64
        example: 529887868
      status:
        description: Current status of the image
        type: string
        enum:
          - error
          - created
          - active
          - initializing
          - unknown
        example: active
      status_code:
        $ref: '#/definitions/ImageStatus'
      version:
        description: Version for the image
        type: integer
        format: int64
        example: 0
  ImagesGet:
    description: ImagesGet represents a list of images
    type: object
    properties:
      images:
        type: array
        items:
          $ref: '#/definitions/Image'
  ImagesPost:
    description: ImagesPost represents the fields to upload a new image
    type: object
    properties:
      default:
        description: Make the image as default
        type: boolean
        example: false
      name:
        description: Name of the image
        type: string
        example: my-image
      path:
        description: Path to store the image
        type: string
        example: /save/image
      source:
        $ref: '#/definitions/ImagesPostSource'
      type:
        $ref: '#/definitions/ImageType'
  ImagesPostSource:
    description: ImagesPostSource specifies the source for creating an image
    type: object
    properties:
      force:
        description: Force specifies whether to stop a running instance before publishing
        type: boolean
        example: false
      instance:
        description: Instance specifies the instance to create an image from (when
          Type="instance")
        type: string
        example: btavtegj1qm58qg7ru50
      type:
        description: 'Type of source: "instance", "import", "upload"'
        type: string
        example: instance
  Instance:
    description: Instance represents a single instance
    type: object
    properties:
      address:
        description: Address is the IP address of the instance
        type: string
        example: 192.168.1.74
      app_id:
        description: 'AppID is the ID of the application the instance is created from.
          Empty if the

          instance has not been created from an application.'
        type: string
        example: cilsiomnfpfec9b1kteg
      app_name:
        description: 'AppName is the name of the application the instance is created
          from. Empty if the

          instance has not been created from an application.'
        type: string
        example: myapp
      app_version:
        description: 'AppVersion is the version of the application the instance is
          created from. Empty if the

          instance has not been created from an application.'
        type: integer
        format: int64
        example: 0
      architecture:
        description: Architecture describes the CPU archtitecture the instance is
          using
        type: string
        example: aarch64
      base:
        description: If this is a base instance or not
        type: boolean
      config:
        description: Config summarizes the configuration the instance uses
        type: object
        properties:
          boot_activity:
            description: BootActivity specifies the Android activity which is started
              by default
            type: string
            example: com.android.settings/.DevSettings
          boot_package:
            description: BootPackage specifies the Android application package name
              which is started by default
            type: string
            example: com.android.settings
          devmode:
            description: DevMode specifies if development mode has been turned on
              for the instance
            type: boolean
          disable_watchdog:
            description: DisableWatchdog defines whether the watchdog is disabled
            type: boolean
          display:
            type: object
            properties:
              density:
                description: Density is the piel density of the virtual display
                type: integer
                format: int64
              fps:
                description: FPS is the frame rate of the virtual display
                type: integer
                format: int64
              height:
                description: Height is the height of the virtual display
                type: integer
                format: int64
              width:
                description: Width is the width of the virtual display
                type: integer
                format: int64
          enable_streaming:
            description: EnableStreaming specifies if streaming should be enabled
              for the instance or not
            type: boolean
          features:
            description: Feature flags to enable for the instance.
            type: string
          metrics_server:
            description: MetricsServer specifies a metrics server the instance will
              use
            type: string
            example: 10.0.0.45:8086
          platform:
            description: Platform specifies the Anbox platform the instance is running
              with
            type: string
            example: webrtc
          security:
            type: object
            properties:
              delete_protected:
                type: boolean
      created_at:
        description: CreatedAt specifies the time at which the instance was created
        type: integer
        format: int64
        example: 1689604498
      entitlements:
        description: Entitlements lists the current identity's entitlements on this
          instance
        type: array
        items:
          type: string
        example:
          - can_view
          - can_edit
      error_message:
        description: ErrorMessage provides an error message when the instance status
          is set to error.
        type: string
        example: instance failed to boot
      id:
        description: ID of the instance
        type: string
        example: cilsreunfpfec9b1ktg0
      image_id:
        description: 'ImageID is the ID of the image the instance is created from.
          Empty if the

          instance has not been created from an image.'
        type: string
        example: cilshrmnfpfec9b1kte0
      image_name:
        description: 'ImageName is the name of the image the instance is created from.
          Empty if the

          instance has not been created from an image.'
        type: string
        example: my-image
      image_variant:
        description: 'ImageVariant is the variant of the image the instance is created
          from. Empty if the

          instance has not been created from an image.'
        type: string
        example: aaos
      image_version:
        description: 'ImageVersion is the version of the image the instance is created
          from. Empty if the

          instance has not been created from an image.'
        type: integer
        format: int64
        example: 0
      name:
        description: Name of the instance. Typically in the format "ams-<ID>".
        type: string
        example: ams-cilsreunfpfec9b1ktg0
      node:
        description: Node the instance is running on
        type: string
        example: lxd0
      public_address:
        description: 'PublicAddress is the external IP address the instance is accessible
          on (in most

          cases the IP of the node it is running on)'
        type: string
        example: 1.2.3.4
      resources:
        $ref: '#/definitions/InstanceResources'
      services:
        description: Services the instance exposes
        type: array
        items:
          $ref: '#/definitions/InstanceService'
      status:
        description: Status of the instance
        type: string
        example: running
      status_code:
        $ref: '#/definitions/InstanceStatus'
      status_message:
        description: StatusMessage describes the current status of the instance
        type: string
        example: '"Waiting for image download"'
      stored_logs:
        description: StoredLogs lists log files AMS stores for the instance.
        type: array
        items:
          type: string
        example:
          - android.log
          - system.log
      tags:
        description: Tags specifies the tags the instance has assigned
        type: array
        items:
          type: string
        example:
          - foo
          - bar
      type:
        $ref: '#/definitions/InstanceType'
  InstanceDelete:
    description: InstanceDelete describes a request used to delete a instance
    type: object
    properties:
      force:
        description: Whether deletion of the instance should be forced
        type: boolean
  InstanceExecControl:
    description: InstanceExecControl represents a message on the instance shell "control"
      socket
    type: object
    properties:
      args:
        description: Arguments to pass to the command
        type: object
        additionalProperties:
          type: string
        example:
          height: 720
          width: 1280
      command:
        description: 'Command to execute. Possible values are: window-resize, signal'
        type: string
        example: window-resize
      signal:
        description: Signal to send
        type: integer
        format: int64
  InstanceExecPost:
    description: InstanceExecPost represents an instance execution request
    type: object
    properties:
      command:
        description: Command inside the instance to execute
        type: array
        items:
          type: string
        example:
          - /bin/ls
      environment:
        description: Environment to setup when the command is executed.
        type: object
        additionalProperties:
          type: string
        example:
          FOO: bar
      height:
        description: Height of the terminal. Only required when `interactive` is set
          to `true`.
        type: integer
        format: int64
      interactive:
        description: Whether the command is executed interactively or not
        type: boolean
      width:
        description: Width of the terminal. Only required when `interactive` is set
          to `true`.
        type: integer
        format: int64
  InstancePatch:
    description: InstancePatch describes the fields which can be changed for an existing
      instance
    type: object
    properties:
      config:
        description: Configuration of the instance
        type: object
        properties:
          security:
            description: Security settings for the instance
            type: object
            properties:
              delete_protected:
                description: Delete protection for the instance
                type: boolean
      desired_status:
        description: Desired status of the instance
        type: string
  InstanceResources:
    description: InstanceResources represents resources assigned to an instance
    type: object
    properties:
      cpus:
        description: CPUs cores assigned to the instance
        type: integer
        format: int64
        example: 2
      disk-size:
        description: DiskSize specifies the amount of storage assigned to the instance
          in bytes
        type: integer
        format: int64
        example: 3221225472
      gpu-slots:
        description: GPUSlots specifies the number of GPU slots the instance got allocated
        type: integer
        format: int64
        example: 1
      gpu-type:
        description: 'Type of the GPU to select for the instance. If not given the

          GPU with the minimum usage is assigned to the instance on the

          node it is scheduled on. Possible values are: amd, intel, nvidia'
        type: string
        example: amd
      memory:
        description: Memory assigned to the instance in bytes
        type: integer
        format: int64
        example: 3221225472
      no_disk_reserve:
        description: NoDiskReserve defines whether to skip reserving the full disk
          quota upfront
        type: boolean
      vpu-slots:
        description: VPUSlots specifies the number of VPU slots the instance
        type: integer
        format: int64
  InstanceService:
    description: 'While NetworkServiceSpec defines what the user requests, InstanceService
      is what is actually

      opened on the instance.'
    type: object
    title: InstanceService describes a single service the instance exposes to the
      outside world.
    properties:
      expose:
        description: 'Expose defines wether the service is exposed on the public endpoint
          of the node

          or if it is only available on the private endpoint. To expose the service
          set to

          true and to false otherwise.'
        type: boolean
      name:
        description: 'Name gives the instance a hint what the exposed port is being
          used for. This

          allows further tweaks inside the instance to expose the service correctly.'
        type: string
        example: myservice
      node_port:
        description: 'NodePort is the port used on the LXD node to map to the service
          port

          If left empty the node port is automatically selected.'
        type: integer
        format: int64
        example: 4000
      node_port_end:
        description: 'NodePortEnd, if specified, denotes the end of the port range
          on the node starting

          at NodePort'
        type: integer
        format: int64
        example: 4010
      port:
        description: Port is the port the instance provides a service on
        type: integer
        format: int64
        example: 3000
      port_end:
        description: PortEnd, if specified, denotes the end of the port range starting
          at Port
        type: integer
        format: int64
        example: 3010
      protocols:
        description: List of network protocols (tcp, udp) the port should be exposed
          for
        type: array
        items:
          $ref: '#/definitions/NetworkProtocol'
        example:
          - tcp
          - udp
